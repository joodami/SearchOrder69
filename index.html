<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>ระบบสืบค้นคำสั่งโรงเรียนพิมานพิทยาสรรค์</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=K2D:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.2/css/bootstrap.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.10.23/css/dataTables.bootstrap4.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container container-md">
  <br>

  <div class="header-box text-center mb-4">
    <img src="https://raw.githubusercontent.com/joodami/school-assets/main/logo.png"
     class="school-logo"
     loading="lazy">
    <h5 id="titleYear">ระบบสืบค้นคำสั่งโรงเรียนพิมานพิทยาสรรค์</h5>
  </div>

  <div class="form-group d-flex justify-content-center">
    <div class="input-group w-100 w-md-auto flex-wrap align-items-center">
      <div class="input-group-prepend">
        <span class="input-group-text bg-white">📅 <strong class="ml-1">เลือกปี</strong></span>
      </div>
      <select id="yearSelect" class="form-control" onchange="loadData()"></select>
      <div class="input-group-append">
        <span class="badge badge-success ml-2 align-self-center" id="currentYearBadge">ปีปัจจุบัน</span>
      </div>
    </div>
  </div>

  <div class="mb-3 d-flex justify-content-end">
    <button class="btn btn-info btn-sm" data-toggle="modal" data-target="#newCommandModal">
      ➕ เพิ่มคำสั่งใหม่
    </button>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">

      <!-- Mobile Search -->
      <div class="d-md-none mb-3">
        <input id="mobileSearch" class="form-control" placeholder="ค้นหาคำสั่ง..." />
      </div>

      <!-- Mobile Card -->
      <div id="mobileCardContainer" class="d-md-none"></div>
      <div id="mobilePagination" class="d-md-none text-center mt-3"></div>

      <!-- Loading Spinner -->
<div id="loadingSpinner" class="text-center my-3">
  <div class="spinner-border text-danger" role="status">
    <span class="sr-only">กำลังโหลด...</span>
  </div>
  <div>กำลังโหลดข้อมูล...</div>
</div>

      <!-- Table -->
      <div class="table-responsive">
       <table id="data-table" class="table table-striped table-bordered">
  <thead>
    <tr>
      <th>คำสั่งที่</th>
      <th>เรื่อง</th>
      <th>สั่ง ณ วันที่</th>
      <th>ไฟล์</th>
    </tr>
  </thead>
</table>
      </div>

      <div class="mt-3 text-center">
        <button id="resetBtn" class="btn btn-outline-danger d-none">
          🏠 กลับหน้าแรก
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="newCommandModal">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">เพิ่มคำสั่งใหม่</h5>
        <button class="close" data-dismiss="modal">❌</button>
      </div>

      <div class="modal-body">
        <div class="form-row">
          <div class="form-group col-md-2">
            <label>คำสั่งที่</label>
            <input class="form-control" id="commandNumberModal">
          </div>
          <div class="form-group col-md-4">
            <label>เรื่อง</label>
            <input class="form-control" id="topicModal">
          </div>
          <div class="form-group col-md-3">
            <label>สั่ง ณ วันที่</label>
            <input class="form-control" id="orderDateModal">
          </div>
          <div class="form-group col-md-3">
            <label>ไฟล์</label>
            <input type="file" class="form-control-file" id="fileInputModal">
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-dismiss="modal">ปิด</button>
        <button class="btn btn-primary" onclick="submitFormModal()">💾 บันทึก</button>
      </div>
    </div>
  </div>
</div>

<div id="saveNotification">บันทึกเรียบร้อยแล้ว</div>

<script src="https://code.jquery.com/jquery-3.5.1.js"></script>
<script src="https://cdn.datatables.net/1.10.23/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.10.23/js/dataTables.bootstrap4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
